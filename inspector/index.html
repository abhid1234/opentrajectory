<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenTrajectory — Inspector for the open agent-trajectory format</title>
<meta name="description" content="OpenTrajectory is the open, vendor-neutral format every AI agent can emit. The Inspector reads a native .ot.json captured from a live run and shows you why it succeeded or failed — entirely in your browser." />
<meta property="og:title" content="OpenTrajectory — one open format every agent emits" />
<meta property="og:description" content="Capture a live agent run as a portable .ot.json, then step through it and see why it failed. Open, cross-harness, eval-first." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://github.com/abhid1234/opentrajectory" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="OpenTrajectory — one open format every agent emits" />
<meta name="twitter:description" content="Capture a live agent run as a portable .ot.json, then step through it and see why it failed. Open, cross-harness, eval-first." />
<link rel="preload" href="fonts/jetbrains-mono-400.woff2" as="font" type="font/woff2" crossorigin />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="k">Open Agent-Trajectory Format · v0.1</span>
      <h1><span class="logomark" aria-hidden="true"><svg viewBox="0 0 40 24" width="40" height="24"><polyline points="1,18 7,18 11,6 16,20 21,11 26,15 31,4 35,12 39,12" /><circle class="head" cx="39" cy="12" r="2.4"/></svg></span>Open<em>Trajectory</em></h1>
    </div>
    <span class="brand-div" aria-hidden="true"></span>
    <div class="fact">
      <span class="lab">Captures</span>
      <span class="v">live runs <small>→ portable <code>.ot.json</code></small></span>
    </div>
    <div class="fact">
      <span class="lab">Reads</span>
      <span class="v">the native format <small>in-browser</small></span>
    </div>
    <div class="fact">
      <span class="lab">Diagnoses</span>
      <span class="v">why a run <small>failed</small></span>
    </div>
    <span class="grow"></span>
    <button id="btn-import" class="topbtn import" title="inspect your own OpenTrajectory file — runs entirely in your browser">▲ Inspect a trajectory</button>
    <button id="btn-share" class="topbtn" title="copy a link to this exact view">⤴ Share</button>
    <button id="btn-keys" class="topbtn" title="keyboard shortcuts">⌨</button>
    <button id="mode-toggle" class="modetoggle" title="toggle the full expert view">Expert view ›</button>
    <div class="src">
      <div><a class="srclink" href="https://github.com/abhid1234/opentrajectory/blob/main/docs/opentrajectory-spec.md" target="_blank" rel="noopener">spec v0.1 ↗</a> · <a class="srclink" href="https://github.com/abhid1234/opentrajectory/tree/main/packages/capture" target="_blank" rel="noopener">capture SDK ↗</a></div>
      <div>open · vendor-neutral · eval-first</div>
      <div><a class="srclink" href="https://github.com/abhid1234/opentrajectory" target="_blank" rel="noopener">github ↗</a></div>
    </div>
  </header>

  <div class="body">
    <aside class="rail">
      <div class="search"><input id="railsearch" type="search" placeholder="search task / repo…" autocomplete="off" /></div>
      <div class="filters" id="railfilters"></div>
      <div class="list" id="raillist"></div>
      <div class="count" id="railcount">—</div>
    </aside>

    <main class="insp" id="insp">
      <div class="empty">Select a trajectory to inspect.</div>
    </main>
  </div>

</div>
<div id="landing" class="landing" hidden></div>
<div id="import-modal" class="overlay-sc" hidden></div>
<div id="shortcuts" class="overlay-sc" hidden></div>
<div id="toast" class="toast"></div>
<div id="patch-modal" class="overlay-sc" hidden></div>
<div id="quiz-modal" class="overlay-sc" hidden></div>
<div id="glossary-modal" class="overlay-sc" hidden></div>
<div id="map-modal" class="overlay-sc" hidden></div>
<div id="diff-modal" class="overlay-sc" hidden></div>
<div id="ask-modal" class="overlay-sc" hidden></div>
<script src="app.js"></script>
<script src="features.js"></script>
</body>
</html>
